<script>
  (function(){
    function ensureOverlay(){
      var el = document.getElementById('fatal-overlay');
      if(!el){
        el = document.createElement('div');
        el.id = 'fatal-overlay';
        el.className = 'fatal-overlay';
        el.innerHTML = '<div class="fatal-card"><div class="fatal-title">PWS Asset Manager Pro crashed</div><pre class="fatal-pre"></pre></div>';
        document.body.appendChild(el);
      }
      return el;
    }
    function show(msg, err){
      try{
        var el = ensureOverlay();
        var pre = el.querySelector('pre');
        var out = String(msg || 'Unknown error');
        if(err && err.stack) out += '\n\n' + err.stack;
        else if(err) out += '\n\n' + String(err);
        pre.textContent = out;
      }catch(e){}
      window.__pwsShowFatal = show;
    }
    window.addEventListener('error', function(e){ show(e.message, e.error); });
    window.addEventListener('unhandledrejection', function(e){ show('Unhandled promise rejection', e.reason); });

    // Capture both runtime errors and resource load failures (CDN blocked, offline, etc.)
    window.addEventListener('error', function(e){
      try{
        if(e && e.target && e.target.tagName === 'SCRIPT' && e.target.src){
          show('Failed to load required script', e.target.src);
          return;
        }
        show((e && e.message) ? e.message : 'Error', e ? e.error : null);
      }catch(_){}
    }, true);

    window.addEventListener('unhandledrejection', function(e){
      show('Unhandled promise rejection', e ? e.reason : null);
    });

  })();
  </script><script>
(function(){
  function check(){
    var missing = [];
    if(!window.React) missing.push('React');
    if(!window.ReactDOM) missing.push('ReactDOM');
    if(!window.Babel) missing.push('Babel');
    // Tailwind is cosmetic; do not block app if missing
    if(!window.Chart) missing.push('Chart.js');
    if(!window.QRCode) missing.push('QRCode');
    if(!window.XLSX) missing.push('XLSX');
    if(missing.length){
      var msg = 'Missing required libraries: ' + missing.join(', ') + '\n\n'
        + 'This usually means your browser/network is blocking CDN scripts, or you are offline.\n'
        + 'If you need an offline-safe build, bundle the libraries locally.';
      if(typeof window.__pwsShowFatal === 'function') window.__pwsShowFatal(msg);
      else alert(msg);
    }
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', check);
  else setTimeout(check, 0);
})();

    // v3.3: Fixed QR Code Modal with proper printing
    function QRCodeModal({ isOpen, onClose, asset }) {
      const qrWrapRef = useRef(null);
      const [qrDataUrl, setQrDataUrl] = useState("");

      useEffect(() => {
        if (!isOpen || !asset) return;
        const text = `Asset ID: ${asset.id}\nName: ${asset.assetName}\nCategory: ${asset.category || "Uncategorized"}\nLocation: ${asset.location || "N/A"}`;

        if (qrWrapRef.current) qrWrapRef.current.innerHTML = "";

        if (window.QRCode && qrWrapRef.current) {
          try {
            new window.QRCode(qrWrapRef.current, {
              text,
              width: 260,
              height: 260,
              correctLevel: window.QRCode.CorrectLevel ? window.QRCode.CorrectLevel.M : undefined
            });

            setTimeout(() => {
              const canvas = qrWrapRef.current.querySelector("canvas");
              const img = qrWrapRef.current.querySelector("img");
              if (canvas && canvas.toDataURL) setQrDataUrl(canvas.toDataURL("image/png"));
              else if (img && img.src) setQrDataUrl(img.src);
            }, 50);
          } catch (e) {
            console.warn("QR generation failed, falling back to remote image.", e);
            const enc = encodeURIComponent(text);
            setQrDataUrl(`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${enc}`);
          }
        } else {
          const enc = encodeURIComponent(text);
          setQrDataUrl(`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${enc}`);
        }
      }, [isOpen, asset]);

      if (!isOpen || !asset) return null;

      function handlePrint() {
        const printWindow = window.open('', '_blank');
        const safeTitle = (asset.assetName || "Asset").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const imgSrc = qrDataUrl || "";
        printWindow.document.write(`
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8"/>
            <title>QR - ${safeTitle}</title>
            <style>
              body{font-family:Arial, sans-serif; margin:24px;}

              <div class="card">
                ${imgSrc ? `<img src="${imgSrc}" alt="QR Code"/>` : `<div>QR not available.</div>`}
              </div>
            </div>
            <script>window.onload = () => window.print();<\/script>
          </body>
          </html>
        `);
        printWindow.document.close();
      }

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
          <div className="w-full max-w-xl rounded-2xl bg-white shadow-2xl border border-slate-200 overflow-hidden">

              <div className="font-semibold text-slate-900">Asset QR Code</div>

            </div>

            <div className="p-5 grid grid-cols-1 md:grid-cols-[1fr_280px] gap-5">
              <div>
                <div className="text-lg font-semibold text-slate-900">{asset.assetName}</div>
                <div className="mt-2 text-sm text-slate-700 leading-relaxed">

                  <button className="p-2 rounded-lg hover:bg-white border border-slate-200" title="Edit" onClick={() => openEditAsset(a)}><Icon name="edit" size={16} /></button>
                  <button className="p-2 rounded-lg hover:bg-white border border-slate-200" title="Duplicate" onClick={() => duplicateAsset(a)}><Icon name="plus" size={16} /></button>
                  <button className="p-2 rounded-lg hover:bg-white border border-slate-200" title="Mark maintenance complete" onClick={() => markMaintComplete(a)}><Icon name="wrench" size={16} /></button>
                  <button className="p-2 rounded-lg hover:bg-white border border-slate-200" title="Generate QR Code" onClick={() => openQRCode(a)}><Icon name="qr" size={16} /></button>
                  <button className="p-2 rounded-lg hover:bg-red-50 border border-slate-200 text-red-700" title="Delete" onClick={() => askDeleteAssets([a.id])}><Icon name="trash" size={16} /></button>
                </div></td>
              </tr>; })}
              {!sorted.length && <tr><td colSpan="10" className="py-10 text-center text-slate-500">No assets match your filters.</td></tr>}
            </tbody></table></div></div>}
            
            {/* Grid View - v3.3: Card-based mobile-friendly view */}
            {assetViewMode === 'grid' && <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
              {sorted.map(a => <AssetCard 
                key={a.id} 
                asset={a} 
                onEdit={openEditAsset} 
                onDuplicate={duplicateAsset}
                onMaintComplete={markMaintComplete}
                onQRCode={openQRCode}
                onDelete={askDeleteAssets}
                selected={selected.has(a.id)}
                onToggleSelect={toggleSelected}
              />)}
              {!sorted.length && <div className="col-span-full text-center py-10 text-slate-500">No assets match your filters.</div>}
            </div>}
          </>}
          {/* Service Log View - v3.3: With Work Order Status */}
          {view === "service" && <div className="glass-card p-4"><div className="overflow-x-auto max-h-[70vh]"><table className="w-full text-sm sticky-header"><thead className="text-left text-slate-600"><tr>
            <th className="py-2 px-2">Date</th>
            <th className="py-2 px-2">Asset</th>
            <th className="py-2 px-2">Type</th>
            <th className="py-2 px-2">Status</th>
            <th className="py-2 px-2">Vendor</th>
            <th className="py-2 px-2">Cost</th>
            <th className="py-2 px-2">Notes</th>
            <th className="py-2 px-2">Actions</th>
          </tr></thead><tbody>
            {serviceFiltered.map(e => {
              // v3.3: Work order status chip colors
              const statusCls = e.status === "Pending" ? "wo-pending" : e.status === "In Progress" ? "wo-inprogress" : "wo-completed";
              return <tr key={e.id} className="border-t border-slate-100 hover:bg-slate-50">
                <td className="py-2 px-2">{e.date}</td>
                <td className="py-2 px-2"><div className="font-semibold text-slate-900">{e.assetName}</div><div className="text-xs text-slate-500 font-mono">{e.assetId}</div></td>
                <td className="py-2 px-2">{e.type}</td>
                <td className="py-2 px-2"><Chip label={e.status || "Completed"} cls={statusCls} /></td>
                <td className="py-2 px-2">{e.vendor || "—"}</td>
                <td className="py-2 px-2">{e.cost != null ? currencyFormatter.format(e.cost) : "—"}</td>
                <td className="py-2 px-2 max-w-xs truncate" title={e.notes}>{e.notes || "—"}</td>
                <td className="py-2 px-2"><div className="flex items-center gap-1">
                  <button className="p-2 rounded-lg hover:bg-white border border-slate-200" title="Edit" onClick={() => { setEditService(e); setServiceModalOpen(true); }}><Icon name="edit" size={16} /></button>
                  <button className="p-2 rounded-lg hover:bg-red-50 border border-slate-200 text-red-700" title="Delete" onClick={() => deleteServiceEntry(e.id)}><Icon name="trash" size={16} /></button>
                </div></td>
              </tr>;
            })}
            {!serviceFiltered.length && <tr><td colSpan="8" className="py-10 text-center text-slate-500">No service log entries.</td></tr>}
          </tbody></table></div></div>}

          {/* Projection View */}
          {view === "projection" && <div className="space-y-4">
            <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
              <Assumption label="Inflation rate" value={`${settings.inflationRate ?? 0}%`} />
              <Assumption label="Annual contribution" value={currencyFormatter.format(settings.annualContribution ?? 0)} />
              <Assumption label="Starting reserve" value={currencyFormatter.format(settings.reserveBalance ?? 0)} />
              <Assumption label="Projection years" value={horizon} />
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
              <ReportCard label="Total projected cost" value={currencyFormatter.format(projectionStats.totalProjectedCost)} />
              <ReportCard label="Avg. annual cost" value={currencyFormatter.format(projectionStats.avgAnnualCost)} />
              <ReportCard label="Peak year" value={projectionStats.peakYear} />
              <ReportCard label="Peak cost" value={currencyFormatter.format(projectionStats.peakCost)} />
            </div>
            <div className="glass-card p-5"><ProjectionChart rows={projectionRows} /></div>
            <div className="glass-card p-4"><div className="overflow-x-auto"><table className="w-full text-sm"><thead className="text-left text-slate-600"><tr><th className="py-2">Year</th><th className="py-2">Replacement cost</th><th className="py-2">Reserve balance</th><th className="py-2">Assets due</th></tr></thead><tbody>
              {projectionRows.map(r => { const dueAssets = activeAssets.filter(a => a.replaceYear === r.year); return <tr key={r.year} className="border-t border-slate-100"><td className="py-2 font-semibold">{r.year}</td><td className="py-2">{currencyFormatter.format(r.cost)}</td><td className={`py-2 ${r.reserve < 0 ? "text-red-700 font-bold" : ""}`}>{currencyFormatter.format(r.reserve)}</td><td className="py-2">{dueAssets.length > 0 ? <div className="flex flex-wrap gap-1">{dueAssets.slice(0, 3).map(a => <span key={a.id} className="px-2 py-1 text-xs rounded-full bg-slate-100 text-slate-700">{a.assetName}</span>)}{dueAssets.length > 3 && <span className="text-xs text-slate-500">+{dueAssets.length - 3} more</span>}</div> : <span className="text-slate-400">—</span>}</td></tr>; })}
            </tbody></table></div></div>
          </div>}

          {/* Calendar View */}
          {view === "calendar" && <CalendarView assets={enriched} />}

          {/* History View */}
          {view === "history" && <div className="glass-card p-5"><div className="space-y-4">
            {(history || []).slice(0, 50).map(h => { const dotCls = h.action === "created" ? "created" : h.action === "deleted" ? "deleted" : h.action === "maintenance" ? "maintenance" : "updated"; return <div key={h.id} className="history-item"><div className={`history-dot ${dotCls}`}></div><div className="flex items-start justify-between gap-3"><div><div className="text-sm font-bold text-slate-900">{h.assetName || h.assetId}</div><div className="text-xs text-slate-500">{h.action.toUpperCase()} • {formatDateTime(h.timestamp)} • {h.user || "User"}</div>{h.changes && <div className="mt-2 text-xs bg-slate-50 p-2 rounded-lg max-w-xl overflow-x-auto">{Object.entries(h.changes).map(([k, v]) => <div key={k} className="flex gap-2"><span className="font-semibold text-slate-700">{k}:</span><span className="text-slate-500 line-through">{String(v.from ?? "—")}</span><span className="text-slate-900">→ {String(v.to ?? "—")}</span></div>)}</div>}</div><div className="text-xs font-mono text-slate-500">{h.assetId}</div></div></div>; })}
            {!(history || []).length && <div className="py-10 text-center text-slate-500">No history yet.</div>}
          </div></div>}
          {/* Reports View */}
          {view === "reports" && <div className="space-y-4">
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Value by Category</div><BreakdownTable rows={CATEGORIES.map(c => ({ label: c, count: activeAssets.filter(a => (a.category || "Other") === c).length, value: activeAssets.filter(a => (a.category || "Other") === c).reduce((s, a) => s + (a.totalCost || 0), 0) })).filter(r => r.count > 0)} /></div>
              <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Value by Priority</div><BreakdownTable rows={PRIORITIES.map(p => ({ label: p, count: activeAssets.filter(a => (a.priority || "Medium") === p).length, value: activeAssets.filter(a => (a.priority || "Medium") === p).reduce((s, a) => s + (a.totalCost || 0), 0) })).filter(r => r.count > 0)} /></div>
              <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Risk Distribution</div><BreakdownTable rows={[{ bucket: "Critical (80-100)", min: 80, max: 100 }, { bucket: "High (60-79)", min: 60, max: 79 }, { bucket: "Medium (40-59)", min: 40, max: 59 }, { bucket: "Low (0-39)", min: 0, max: 39 }].map(b => ({ label: b.bucket, count: activeAssets.filter(a => (a.risk ?? 0) >= b.min && (a.risk ?? 0) <= b.max).length, value: activeAssets.filter(a => (a.risk ?? 0) >= b.min && (a.risk ?? 0) <= b.max).reduce((s, a) => s + (a.totalCost || 0), 0) })).filter(r => r.count > 0)} /></div>
              <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Replacement by Year (Next 10)</div><BreakdownTable rows={Array.from({ length: 10 }, (_, i) => currentYear + i).map(y => ({ label: y, count: activeAssets.filter(a => a.replaceYear === y).length, value: activeAssets.filter(a => a.replaceYear === y).reduce((s, a) => s + (a.totalCost || 0), 0) })).filter(r => r.count > 0)} /></div>
            </div>
            <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Maintenance Summary</div><div className="grid grid-cols-1 lg:grid-cols-4 gap-4"><ReportCard label="Overdue" value={activeAssets.filter(a => a.maint?.status === "overdue").length} /><ReportCard label="Due soon (30d)" value={activeAssets.filter(a => a.maint?.status === "due").length} /><ReportCard label="On schedule" value={activeAssets.filter(a => a.maint?.status === "ok").length} /><ReportCard label="No schedule" value={activeAssets.filter(a => !a.maint).length} /></div></div>
          </div>}

          {/* Data View */}
          {view === "data" && <div className="space-y-4">
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
              <div className="glass-card p-5 cursor-pointer hover:shadow-lg transition" onClick={() => setImportModalOpen(true)}><div className="flex items-center gap-3"><div className="p-3 rounded-xl" style={{backgroundColor: 'rgba(0,133,62,0.15)'}}><Icon name="upload" size={24} className="text-emerald-700" /></div><div><div className="font-extrabold text-slate-900">Import data</div><div className="text-sm text-slate-600">Excel (.xlsx) or JSON backup</div></div></div></div>
              <div className="glass-card p-5 cursor-pointer hover:shadow-lg transition" onClick={exportExcel}><div className="flex items-center gap-3"><div className="p-3 rounded-xl" style={{backgroundColor: 'rgba(0,154,218,0.15)'}}><Icon name="download" size={24} style={{color: '#009ADA'}} /></div><div><div className="font-extrabold text-slate-900">Export Excel</div><div className="text-sm text-slate-600">Assets, service log, projection</div></div></div></div>
              <div className="glass-card p-5 cursor-pointer hover:shadow-lg transition" onClick={exportBackupJSON}><div className="flex items-center gap-3"><div className="p-3 rounded-xl" style={{backgroundColor: 'rgba(201,169,4,0.15)'}}><Icon name="database" size={24} style={{color: '#C9A904'}} /></div><div><div className="font-extrabold text-slate-900">Full backup (JSON)</div><div className="text-sm text-slate-600">All data + settings + history</div></div></div></div>
            </div>
            <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Data summary</div><div className="grid grid-cols-2 lg:grid-cols-4 gap-4"><ReportCard label="Total assets" value={assets.length} /><ReportCard label="Service entries" value={serviceLog.length} /><ReportCard label="History records" value={history.length} /><ReportCard label="Current ID counter" value={idCounter} /></div></div>
          </div>}

          {/* Settings View */}
          {view === "settings" && <div className="space-y-4">
            <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Organization</div><div className="grid grid-cols-1 lg:grid-cols-2 gap-4"><SettingField label="Organization name" value={settings.orgName} onChange={(v) => setSettings(prev => ({ ...prev, orgName: v }))} /></div></div>
            <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Financial assumptions</div><div className="grid grid-cols-1 lg:grid-cols-2 gap-4"><SettingField label="Inflation rate (%)" value={settings.inflationRate} onChange={(v) => setSettings(prev => ({ ...prev, inflationRate: parseFloat(v) || 0 }))} /><SettingField label="Reserve balance ($)" value={settings.reserveBalance} onChange={(v) => setSettings(prev => ({ ...prev, reserveBalance: parseFloat(v) || 0 }))} /><SettingField label="Annual contribution ($)" value={settings.annualContribution} onChange={(v) => setSettings(prev => ({ ...prev, annualContribution: parseFloat(v) || 0 }))} /><SettingField label="Annual budget ($)" value={settings.annualBudget} onChange={(v) => setSettings(prev => ({ ...prev, annualBudget: parseFloat(v) || 0 }))} /></div></div>
            <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">Display options</div><div className="grid grid-cols-1 lg:grid-cols-2 gap-4"><Toggle label="Show depreciated values" checked={settings.showDepreciation ?? true} onChange={(v) => setSettings(prev => ({ ...prev, showDepreciation: v }))} /><Toggle label="Show warranty warnings" checked={settings.showWarranty ?? true} onChange={(v) => setSettings(prev => ({ ...prev, showWarranty: v }))} /></div></div>
            <div className="glass-card p-5"><div className="text-lg font-extrabold text-slate-900 mb-4">App info</div><div className="grid grid-cols-1 lg:grid-cols-3 gap-4"><ReportCard label="Version" value={APP_VERSION} /><ReportCard label="Last export" value={isoDate()} /><ReportCard label="Storage" value="localStorage" /></div></div>
          </div>}
        </main>
        {/* Asset Modal */}
        <Modal title={editAsset ? "Edit asset" : "Add asset"} subtitle={editAsset ? `Editing ${editAsset.id}` : "Fill in the details for your new asset."} isOpen={assetModalOpen} onClose={() => { setAssetModalOpen(false); setEditAsset(null); }}>
          <AssetForm initial={editAsset} catalog={ASSET_CATALOG} onSubmit={saveAsset} onCancel={() => { setAssetModalOpen(false); setEditAsset(null); }} />
        </Modal>

        {/* Service Modal */}
        <Modal title={editService ? "Edit service entry" : "Add service entry"} subtitle="Log maintenance, repairs, or replacements." isOpen={serviceModalOpen} onClose={() => { setServiceModalOpen(false); setEditService(null); }} size="md">
          <ServiceLogForm assets={assets} initial={editService} onSubmit={saveServiceEntry} onCancel={() => { setServiceModalOpen(false); setEditService(null); }} />
        </Modal>

        {/* Import Modal */}
        <ImportWizardModal isOpen={importModalOpen} onClose={() => setImportModalOpen(false)} onImportFile={handleFileImport} onExportExcel={exportExcel} onExportBackup={exportBackupJSON} onDownloadTemplate={downloadTemplate} />

        {/* QR Code Modal */}
        <QRCodeModal isOpen={qrModalOpen} onClose={() => { setQrModalOpen(false); setQrAsset(null); }} asset={qrAsset} />

        {/* Bulk Edit Modal */}
        <BulkEditModal isOpen={bulkEditModalOpen} onClose={() => setBulkEditModalOpen(false)} selectedAssets={selectedAssets} onSave={handleBulkEditSave} />

        {/* Help Modal */}
        <Modal title="PWS Asset Manager Pro" subtitle="Choctaw Nation Water Resource Management" isOpen={helpOpen} onClose={() => setHelpOpen(false)} size="md">
          <div className="space-y-4 text-sm text-slate-700">
            <div className="p-4 rounded-xl" style={{backgroundColor: 'rgba(0,133,62,0.1)'}}>
              <div className="font-bold" style={{color: '#421400'}}>Version {APP_VERSION}</div>
              <div className="text-xs mt-1">Built for public water system asset management</div>
            </div>
            <div>
              <div className="font-bold text-slate-900">Features</div>
              <ul className="mt-2 space-y-1 text-slate-600">
                <li>• Dashboard with risk analysis and charts</li>
                <li>• Asset register with table and card views</li>
                <li>• Work order tracking with status (Pending/In Progress/Completed)</li>
                <li>• QR code generation for asset labeling</li>
                <li>• Bulk editing of multiple assets</li>
                <li>• Maintenance calendar view</li>
                <li>• Capital replacement projection</li>
                <li>• Excel import/export</li>
                <li>• Dark mode support</li>
                <li>• Smart location links (Google Maps)</li>
              </ul>
            </div>
            <div>
              <div className="font-bold text-slate-900">Keyboard shortcuts</div>
              <div className="mt-2 text-slate-600">Use Tab to navigate • Enter to confirm • Escape to cancel</div>
            </div>
            <div>
              <div className="font-bold text-slate-900">Data storage</div>
              <div className="mt-2 text-slate-600">All data is stored locally in your browser. Export regularly for backup.</div>
            </div>
            <div className="text-xs text-slate-500 pt-4 border-t border-slate-200">
              <div className="font-semibold" style={{color: '#421400'}}>Choctaw Nation of Oklahoma</div>
              <div>Water Resource Management • Environmental Protection Service</div>
            </div>
          </div>
        </Modal>

        {/* Confirm Dialog */}
        <ConfirmDialog isOpen={!!confirm.open} title={confirm.title || "Confirm"} body={confirm.body || ""} danger={!!confirm.danger} confirmText={confirm.confirmText || "Confirm"} onConfirm={confirm.onConfirm || (() => setConfirm({ open: false }))} onCancel={confirm.onCancel || (() => setConfirm({ open: false }))} />

        {/* Toast */}
        <Toast toast={toast} onClose={() => setToast(null)} />
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
